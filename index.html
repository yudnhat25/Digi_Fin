
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CoinWise AI - Learn Crypto Risk-Free</title>
    <!-- Tailwind config MUST be defined BEFORE the CDN script so JIT picks it up -->
    <script>
      window.tailwind = window.tailwind || {};
      window.tailwind.config = {
        safelist: [
          { pattern: /(bg|text|border|from|via|to|ring|shadow)-(emerald|blue|violet|amber|rose|cyan|orange|slate|pink|sky|purple|indigo|green|red|yellow|fuchsia)-(50|100|200|300|400|500|600|700|800|900|950)(\/(5|10|15|20|25|30|40|50|60|70|80|90))?/ },
          { pattern: /(bg|text|border)-\[#(635BFF|5851e0)\]/ }
        ]
      };
    </script>
    <script src="https://cdn.tailwindcss.com" onerror="document.getElementById('boot-status') && (document.getElementById('boot-status').textContent='Tailwind CDN blocked — UI will be unstyled', document.getElementById('boot-status').style.color='#f43f5e')"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #020617;
        color: #f8fafc;
      }
      /* Custom scrollbar */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: #0f172a;
      }
      ::-webkit-scrollbar-thumb {
        background: #334155;
        border-radius: 10px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #475569;
      }
    </style>
</head>
  <body>
    <div id="root">
      <div id="boot-fallback" style="min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:'Inter',sans-serif;color:#94a3b8;text-align:center;padding:32px;">
        <div>
          <div style="font-size:48px;font-weight:900;color:#10b981;margin-bottom:12px;letter-spacing:-0.04em;">CoinWise AI</div>
          <div style="font-size:14px;margin-bottom:4px;">Loading bundle…</div>
          <div id="boot-status" style="font-size:11px;color:#64748b;font-family:monospace;">Initialising</div>
        </div>
      </div>
    </div>
    <script>
      window.__bootStart = Date.now();
      window.addEventListener('error', function(e) {
        var s = document.getElementById('boot-status');
        if (s) { s.style.color = '#f43f5e'; s.textContent = 'JS error: ' + (e.message || e.error) + ' @ ' + (e.filename || '?') + ':' + (e.lineno || '?'); }
      });
      window.addEventListener('unhandledrejection', function(e) {
        var s = document.getElementById('boot-status');
        if (s) { s.style.color = '#f43f5e'; s.textContent = 'Promise rejection: ' + (e.reason && e.reason.message || e.reason); }
      });
      setTimeout(function() {
        var fallback = document.getElementById('boot-fallback');
        var s = document.getElementById('boot-status');
        if (fallback && s) {
          s.textContent = 'Bundle still not mounted after 8s — open DevTools (F12) → Console for details.';
          s.style.color = '#f59e0b';
        }
      }, 8000);
    </script>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
